<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — NVR Monitor HIC</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="login-body">

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <i data-lucide="shield-check" class="login-logo-icon"></i>
      </div>
      <h1>NVR Monitor</h1>
      <p class="login-subtitle">Acceso restringido — Infraestructura de Telecomunicaciones</p>

      <form id="form-login" autocomplete="off">
        <div class="login-field">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" placeholder="usuario.apellido" autocomplete="username" required>
        </div>

        <div class="login-field">
          <label for="password">Contraseña</label>
          <div class="login-password-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" id="btn-ver-password" class="login-eye" tabindex="-1" aria-label="Mostrar contraseña">
              <i data-lucide="eye" style="width:16px;height:16px"></i>
            </button>
          </div>
        </div>

        <div id="login-error" class="login-error" hidden></div>

        <button type="submit" id="btn-login" class="login-submit">
          <i data-lucide="log-in" class="icon-btn"></i> Ingresar
        </button>
      </form>

      <p class="login-footnote">Acceso exclusivo para administradores de red autorizados. Fundación Cardiovascular de Colombia — HIC.</p>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
